<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TVRS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Login to TVRS</h1>
                <p>Select your role and enter your credentials</p>
            </div>
            
            <form action="/login" method="POST">
                <div class="form-group mb-3">
                    <label class="form-label">Select Role</label>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="radio" name="role" value="citizen" checked>
                            <span>Login as Citizen</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="radio" name="role" value="officer">
                            <span>Login as Police Officer</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="radio" name="role" value="admin">
                            <span>Login as Admin</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username / Email</label>
                    <input type="text" id="username" name="username" class="form-control" required placeholder="Enter your username">
                </div>
                
                <div class="form-group mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block btn-lg">Login</button>
            </form>
            
            <div class="text-center mt-3" style="font-size: 0.875rem; color: var(--text-secondary);">
                Don't have an account? <a href="signup.html" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">Sign Up</a>
            </div>
        </div>
    </div>

</body>
</html>
